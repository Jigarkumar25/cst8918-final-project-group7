apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
        - name: weather-app
          image: pate1595acr01.azurecr.io/weather-app:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: WEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-secret
                  key: WEATHER_API_KEY
